<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYH — Xpenses Pro</title>
    <style>
        :root {
            --mac-bg: #eef2f6;
            --mac-card: #ffffff;
            --mac-sidebar: #f8fafc;
            --mac-text-main: #1c1c1e;
            --mac-text-muted: #636366;
            --mac-accent: #007aff;
            --mac-accent-hover: #0062cc;
            --mac-border: rgba(0, 0, 0, 0.06);
            --mac-border-heavy: rgba(0, 0, 0, 0.12);
            --radius-pro: 14px;
            --radius-input: 8px;
            
            /* Status Colors */
            --color-fuel: #ff9500;
            --color-salary: #34c759;
            --color-market: #af52de;
            --color-bill: #55befc;
            --color-other: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--mac-bg);
            color: var(--mac-text-main);
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            display: none; /* Controlled by JS */
        }

        /* Pro Login Screen */
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            margin-top: 12vh;
            background: var(--mac-card);
            border: 1px solid var(--mac-border-heavy);
            border-radius: var(--radius-pro);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.25);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            color: var(--mac-text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Pro Layout Grid */
        .window-shell {
            background: var(--mac-card);
            border: 1px solid var(--mac-border-heavy);
            border-radius: var(--radius-pro);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 900px) {
            .window-shell {
                grid-template-columns: 360px 1fr;
            }
        }

        /* Sidebar Panel (Controls) */
        .sidebar {
            background-color: var(--mac-sidebar);
            border-right: 1px solid var(--mac-border);
            padding: 32px 24px;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Display Panel */
        .main-panel {
            padding: 32px;
            background: #ffffff;
        }

        /* Top Bar Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--mac-border);
        }

        .top-bar h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Summary Cards - Vivid Style */
        .kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: linear-gradient(145deg, #1c1c1e, #2c2c2e);
            color: #ffffff;
            border-radius: var(--radius-pro);
            padding: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }

        .kpi-card.blue-theme {
            background: linear-gradient(145deg, #007aff, #0056b3);
        }

        .kpi-card .kpi-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-card .kpi-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Inputs Elements */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--mac-text-main);
        }

        .form-control {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: var(--radius-input);
            font-size: 14px;
            color: var(--mac-text-main);
            outline: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
            transition: all 0.15s ease-in-out;
        }

        .form-control:focus {
            border-color: var(--mac-accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.25);
        }

        /* Dynamic Field Animation Container */
        .conditional-container {
            display: none;
            background: rgba(0, 0, 0, 0.03);
            padding: 14px;
            border-radius: var(--radius-input);
            margin-bottom: 18px;
            border: 1px dashed rgba(0,0,0,0.1);
        }

        .conditional-container.show {
            display: block;
        }

        .conditional-container .form-group:last-child {
            margin-bottom: 0;
        }

        /* Professional Buttons */
        .btn-pro {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 20px;
            background: var(--mac-accent);
            color: white;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--radius-input);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 4px rgba(0, 122, 255, 0.15);
            transition: background 0.15s;
        }

        .btn-pro:hover {
            background: var(--mac-accent-hover);
        }

        .btn-action-outline {
            background: #ffffff;
            color: var(--mac-text-main);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: var(--radius-input);
            height: 34px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .btn-action-outline:hover {
            background: #f5f5f7;
        }

        .btn-logout {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-logout:hover {
            text-decoration: underline;
        }

        /* Table Control Bar */
        .table-header-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-header-group h2 {
            font-size: 18px;
            font-weight: 700;
        }

        /* Pro Data Table (Zebra Pattern) */
        .table-scroll {
            overflow-x: auto;
            border: 1px solid var(--mac-border-heavy);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
        }

        th {
            background: #f5f5f7;
            color: var(--mac-text-main);
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid var(--mac-border-heavy);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--mac-border);
            color: var(--mac-text-main);
            vertical-align: middle;
        }

        tr:nth-child(even) {
            background-color: #f9fbfd; /* Subtle contrast row */
        }

        /* Decorative Category Dots */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Dynamic Badge Tags */
        .tag-pill {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            background: #e5e5ea;
            color: #48484a;
            border-radius: 6px;
            margin-top: 4px;
        }

        .tag-pill.vehicle { background: #ffedd5; color: #c2410c; }
        .tag-pill.person { background: #dcfce7; color: #15803d; }

        .no-data {
            text-align: center;
            color: var(--mac-text-muted);
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- Professional Auth Panel -->
    <div id="authBlock" class="auth-wrapper">
        <div class="auth-icon">⚙️</div>
        <div class="auth-title">KYH Ledger</div>
        <div class="auth-subtitle">ระบบบันทึกบัญชีรายจ่ายสําหรับผู้บริหาร</div>
        <form id="loginForm">
            <div class="form-group">
                <input type="password" id="passwordInput" class="form-control" placeholder="ใส่รหัสผ่านเพื่อยืนยันตัวตน" style="text-align: center; height: 42px;" required autofocus>
            </div>
            <button type="submit" class="btn-pro" style="height: 42px;">Unlock System</button>
        </form>
    </div>

    <!-- Main Core Dashboard App Shell -->
    <div id="appBlock" class="container">
        <div class="window-shell">
            
            <!-- LEFT CONTROL PANEL: Input Controller -->
            <div class="sidebar">
                <h2><span>📝</span> บันทึกข้อมูล</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="date">วันที่ทำรายการ</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">หมวดหมู่ค่าใช้จ่าย</label>
                        <select id="category" class="form-control" required>
                            <option value="">-- เลือกหมวดหมู่ --</option>
                            <option value="ค่าน้ำมัน">ค่าน้ำมัน</option>
                            <option value="ค่าเบี้ยเลี้ยง">ค่าเบี้ยเลี้ยง</option>
                            <option value="ค่าเงินเดือน">ค่าเงินเดือน</option>
                            <option value="ค่าประกันสังคม">ค่าประกันสังคม</option>
                            <option value="ค่าทางด่วน / ค่าผ่านทาง">ค่าทางด่วน / ค่าผ่านทาง</option>
                            <option value="ค่าโทรศัพท์ / อินเตอร์เน็ต">ค่าโทรศัพท์ / อินเตอร์เน็ต</option>
                            <option value="ค่าไฟฟ้า / ประปา">ค่าไฟฟ้า / ประปา</option>
                            <option value="ค่าส่งเอกสาร / พัสดุ / ขนส่งสินค้า">ค่าส่งเอกสาร / พัสดุ</option>
                            <option value="ค่าอุปกรณ์สำนักงาน">ค่าอุปกรณ์สำนักงาน</option>
                            <option value="ค่าอุปกรณ์ซ่อมบำรุงรถยนต์">ค่าอุปกรณ์ซ่อมรถ</option>
                            <option value="ค่าปรับจราจร">ค่าปรับจราจร</option>
                            <option value="ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ">ค่า พรบ. / ประกันรถ</option>
                            <option value="ค่างานศพ / งานแต่ง / บริจาค / งานบุญ">ค่างานบุญ / บริจาค</option>
                            <option value="ค่าน้ำดื่ม">ค่าน้ำดื่ม</option>
                            <option value="ค่าแรงพิเศษลูกน้อง">ค่าแรงพิเศษลูกน้อง</option>
                            <option value="ค่าแรง Outsource">ค่าแรง Outsource</option>
                            <option value="ค่าไหว้เจ้า">ค่าไหว้เจ้า</option>
                            <option value="ค่ารับรองแขก">ค่ารับรองแขก</option>
                        </select>
                    </div>

                    <!-- Dynamic Nested Context Fields Boxes -->
                    <div id="conditionalWrapper" class="conditional-container">
                        <div id="vehicleFieldBlock" style="display: none;">
                            <div class="form-group">
                                <label for="vehiclePlate">🚗 หมายเลขทะเบียนรถ</label>
                                <input type="text" id="vehiclePlate" class="form-control" placeholder="เช่น กข-1234 สมุทรสาคร">
                            </div>
                        </div>
                        <div id="personFieldBlock" style="display: none;">
                            <div class="form-group">
                                <label for="personName">👤 ชื่อผู้รับเงิน / พนักงาน</label>
                                <input type="text" id="personName" class="form-control" placeholder="ระบุชื่อบุคคล">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="amount">จำนวนเงินสุทธิ (บาท)</label>
                        <input type="number" id="amount" class="form-control" min="0.01" step="0.01" placeholder="0.00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="note">รายละเอียดเพิ่มเติม</label>
                        <input type="text" id="note" class="form-control" placeholder="บันทึกช่วยจำ...">
                    </div>
                    
                    <button type="submit" class="btn-pro" style="margin-top: 10px;">คีย์ลงระบบบัญชี</button>
                </form>
            </div>

            <!-- RIGHT MAIN PANEL: Analytics & Ledger Viewing Explorer -->
            <div class="main-panel">
                <div class="top-bar">
                    <div>
                        <h1>KYH Workspace</h1>
                    </div>
                    <div>
                        <button id="logoutBtn" class="btn-logout">ออกจากระบบบัญชี</button>
                    </div>
                </div>

                <!-- Financial Highlight Display Boxes -->
                <div class="kpi-row">
                    <div class="kpi-card blue-theme">
                        <div class="kpi-label">Total Outflow / รายจ่ายสะสม</div>
                        <div class="kpi-value" id="totalAmount">0.00 ฿</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Transactions / จำนวนรายการ</div>
                        <div class="kpi-value" id="totalCount">0 รายการ</div>
                    </div>
                </div>

                <!-- Ledger Grid Area -->
                <div>
                    <div class="table-header-group">
                        <h2>สมุดบัญชีรายจ่ายแยกหมวดหมู่</h2>
                        <div style="display: flex; gap: 10px;">
                            <select id="filterCategory" class="form-control" style="width: 180px; height: 34px; font-size: 13px;">
                                <option value="">หมวดหมู่ทั้งหมด</option>
                                <option value="ค่าน้ำมัน">ค่าน้ำมัน</option>
                                <option value="ค่าเบี้ยเลี้ยง">ค่าเบี้ยเลี้ยง</option>
                                <option value="ค่าเงินเดือน">ค่าเงินเดือน</option>
                                <option value="ค่าทางด่วน / ค่าผ่านทาง">ค่าทางด่วน</option>
                                <option value="ค่าไฟฟ้า / ประปา">ค่าไฟ / ค่าน้ำ</option>
                                <option value="ค่าแรง Outsource">ค่าแรง Outsource</option>
                            </select>
                            <button id="exportBtn" class="btn-action-outline">
                                <span>📥</span> Export CSV
                            </button>
                        </div>
                    </div>

                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 110px;">วันที่บันทึก</th>
                                    <th style="width: 190px;">หมวดหมู่ประเภท</th>
                                    <th>รายละเอียดรายการ</th>
                                    <th style="text-align: right; width: 140px;">ยอดเงินสุทธิ</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                        <div id="noDataMessage" class="no-data" style="display: none;">
                            ไม่พบข้อมูลรายการบัญชีในตัวกรองนี้
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // SHA-256 Checksum Verification (Default: 1234)
        const HASHED_PASSWORD_KEY = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; 

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Color Palette Mapper for Categories Indicators
        const dotColors = {
            'ค่าน้ำมัน': 'var(--color-fuel)',
            'ค่าอุปกรณ์ซ่อมบำรุงรถยนต์': 'var(--color-fuel)',
            'ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ': 'var(--color-fuel)',
            'ค่าเงินเดือน': 'var(--color-salary)',
            'ค่าแรง Outsource': 'var(--color-salary)',
            'ค่าแรงพิเศษลูกน้อง': 'var(--color-salary)',
            'ค่าเบี้ยเลี้ยง': 'var(--color-salary)',
            'ยิงแอด / การตลาด': 'var(--color-market)',
            'ค่าไฟฟ้า / ประปา': 'var(--color-bill)',
            'ค่าโทรศัพท์ / อินเตอร์เน็ต': 'var(--color-bill)'
        };

        const defaultMock = [
            { id: 1, date: '2026-07-02', category: 'ค่าน้ำมัน', amount: 1800.00, note: 'เติมน้ำมันดีเซลรถกระบะขนส่งสินค้า', vehiclePlate: 'บย-4321 สมุทรสาคร', personName: '' },
            { id: 2, date: '2026-07-05', category: 'ค่าเงินเดือน', amount: 28000.00, note: 'เงินเดือนพนักงานประจำงวดล่าสุด', vehiclePlate: '', personName: 'สมชาย ตั้งใจทำงาน' },
            { id: 3, date: '2026-07-09', category: 'ค่าอุปกรณ์สำนักงาน', amount: 840.00, note: 'ซื้อแฟ้มและอุปกรณ์จัดระเบียบเอกสารออฟฟิศ', vehiclePlate: '', personName: '' }
        ];

        let expenses = JSON.parse(localStorage.getItem('apple_pro_db')) || defaultMock;
        if (!localStorage.getItem('apple_pro_db')) {
            localStorage.setItem('apple_pro_db', JSON.stringify(expenses));
        }

        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // Layout Elements Mapping
        const authBlock = document.getElementById('authBlock');
        const appBlock = document.getElementById('appBlock');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const logoutBtn = document.getElementById('logoutBtn');
        const expenseForm = document.getElementById('expenseForm');
        const categorySelect = document.getElementById('category');
        
        const conditionalWrapper = document.getElementById('conditionalWrapper');
        const vehicleFieldBlock = document.getElementById('vehicleFieldBlock');
        const vehiclePlateInput = document.getElementById('vehiclePlate');
        const personFieldBlock = document.getElementById('personFieldBlock');
        const personNameInput = document.getElementById('personName');
        
        const tableBody = document.getElementById('tableBody');
        const noDataMessage = document.getElementById('noDataMessage');
        const totalAmountEl = document.getElementById('totalAmount');
        const totalCountEl = document.getElementById('totalCount');
        const filterCategory = document.getElementById('filterCategory');
        const exportBtn = document.getElementById('exportBtn');

        const vehicleCategories = ['ค่าน้ำมัน', 'ค่าอุปกรณ์ซ่อมบำรุงรถยนต์', 'ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ'];
        const personCategories = ['ค่าเบี้ยเลี้ยง', 'ค่าเงินเดือน', 'ค่าแรงพิเศษลูกน้อง', 'ค่าแรง Outsource'];

        // Dynamic Interface Render Engine
        categorySelect.addEventListener('change', function() {
            const val = categorySelect.value;
            let showVehicle = vehicleCategories.includes(val);
            let showPerson = personCategories.includes(val);

            if (showVehicle || showPerson) {
                conditionalWrapper.classList.add('show');
            } else {
                conditionalWrapper.classList.remove('show');
            }

            if (showVehicle) {
                vehicleFieldBlock.style.display = 'block';
                vehiclePlateInput.required = true;
            } else {
                vehicleFieldBlock.style.display = 'none';
                vehiclePlateInput.required = false;
                vehiclePlateInput.value = '';
            }

            if (showPerson) {
                personFieldBlock.style.display = 'block';
                personNameInput.required = true;
            } else {
                personFieldBlock.style.display = 'none';
                personNameInput.required = false;
                personNameInput.value = '';
            }
        });

        // Guard Router Access
        if (sessionStorage.getItem('isAuthenticated') === 'true') {
            authBlock.style.display = 'none';
            appBlock.style.display = 'block';
            renderProDashboard();
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const inputHash = await sha256(passwordInput.value);
            if (inputHash === HASHED_PASSWORD_KEY) {
                sessionStorage.setItem('isAuthenticated', 'true');
                authBlock.style.display = 'none';
                appBlock.style.display = 'block';
                renderProDashboard();
            } else {
                alert('รหัสผ่านเข้าสู่ระบบไม่ถูกต้อง');
                passwordInput.value = '';
            }
        });

        logoutBtn.addEventListener('click', function() {
            sessionStorage.removeItem('isAuthenticated');
            window.location.reload();
        });

        // Main Ledger Calculations
        function renderProDashboard() {
            const catFilter = filterCategory.value;
            const filtered = expenses.filter(exp => catFilter === '' || exp.category === catFilter);
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            tableBody.innerHTML = '';
            if (filtered.length === 0) {
                noDataMessage.style.display = 'block';
            } else {
                noDataMessage.style.display = 'none';
                filtered.forEach(exp => {
                    let subBadge = '';
                    if (exp.vehiclePlate) subBadge = `<br><span class="tag-pill vehicle">🚗 ทะเบียน: ${exp.vehiclePlate}</span>`;
                    if (exp.personName) subBadge = `<br><span class="tag-pill person">👤 ผู้รับ: ${exp.personName}</span>`;

                    const dotColor = dotColors[exp.category] || 'var(--color-other)';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="color: var(--mac-text-muted); font-size: 13px;">${exp.date}</td>
                        <td>
                            <div class="status-badge">
                                <span class="status-dot" style="background-color: ${dotColor};"></span>
                                <span>${exp.category}</span>
                            </div>
                        </td>
                        <td>
                            <div style="font-weight: 500;">${exp.note || '—'}</div>
                            ${subBadge}
                        </td>
                        <td style="text-align: right; font-weight: 700; color: var(--mac-text-main); font-size: 15px;">
                            ${exp.amount.toLocaleString('th-TH', {minimumFractionDigits: 2})} ฿
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            const totalSum = filtered.reduce((sum, exp) => sum + parseFloat(exp.amount), 0);
            totalAmountEl.textContent = `${totalSum.toLocaleString('th-TH', {minimumFractionDigits: 2})} ฿`;
            totalCountEl.textContent = `${filtered.length} รายการ`;
        }

        // Action Data Controller
        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                date: document.getElementById('date').value,
                category: categorySelect.value,
                amount: parseFloat(document.getElementById('amount').value),
                note: document.getElementById('note').value,
                vehiclePlate: vehiclePlateInput.value,
                personName: personNameInput.value
            };

            expenses.push(newRecord);
            localStorage.setItem('apple_pro_db', JSON.stringify(expenses));
            
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            vehiclePlateInput.value = '';
            personNameInput.value = '';
            
            conditionalWrapper.classList.remove('show');
            vehicleFieldBlock.style.display = 'none';
            personFieldBlock.style.display = 'none';
            
            renderProDashboard();
        });

        filterCategory.addEventListener('change', renderProDashboard);

        // Data Exporter Module
        exportBtn.addEventListener('click', function() {
            if (expenses.length === 0) return alert('ไม่มีข้อมูลสําหรับดึงรายงาน');
            
            let csvContent = "\uFEFF"; 
            csvContent += "วันที่,หมวดหมู่ค่าใช้จ่าย,รายละเอียด,ทะเบียนรถ,ชื่อผู้รับเงิน/พนักงาน,จำนวนเงิน (บาท)\n";
            
            expenses.forEach(exp => {
                csvContent += `"${exp.date}","${exp.category}","${(exp.note || '').replace(/"/g, '""')}","${(exp.vehiclePlate || '').replace(/"/g, '""')}","${(exp.personName || '').replace(/"/g, '""')}","${exp.amount}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "KYH_Pro_Ledger.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
