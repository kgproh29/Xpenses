<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrahBrahBrand — Expense System</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-text-main: #1d1d1f;
            --apple-text-muted: #86868b;
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-border: rgba(0, 0, 0, 0.08);
            --radius-input: 12px;
            --radius-card: 22px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: none;
        }

        /* Login Screen */
        .auth-container {
            width: 100%;
            max-width: 400px;
            margin-top: 10vh;
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--apple-border);
            border-radius: var(--radius-card);
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            color: var(--apple-text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Header */
        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--apple-text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Layout Grid */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 850px) {
            .app-grid {
                grid-template-columns: 380px 1fr;
            }
        }

        /* Apple Cards */
        .card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--apple-border);
            border-radius: var(--radius-card);
            padding: 32px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }

        .card h2 {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.2px;
        }

        /* Inputs & Controls */
        .form-group {
            margin-bottom: 20px;
        }

        /* Conditional Animation Box */
        .conditional-field {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .conditional-field.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--apple-text-main);
        }

        .form-control {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--apple-border);
            border-radius: var(--radius-input);
            font-size: 15px;
            color: var(--apple-text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--apple-blue);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 24px;
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: var(--radius-input);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--apple-blue-hover);
        }

        .btn-secondary {
            background-color: rgba(0, 0, 0, 0.04);
            color: var(--apple-blue);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 0, 0, 0.08);
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--apple-blue);
            font-size: 14px;
            cursor: pointer;
            font-weight: 400;
        }

        .btn-text:hover {
            text-decoration: underline;
        }

        /* Dashboard Overview */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: var(--apple-card);
            border: 1px solid var(--apple-border);
            border-radius: var(--radius-card);
            padding: 24px;
        }

        .stat-box .label {
            font-size: 13px;
            color: var(--apple-text-muted);
            margin-bottom: 6px;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Table Filter Group */
        .filter-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }

        .filter-select {
            max-width: 220px;
            height: 36px;
            font-size: 13px;
            border-radius: 8px;
        }

        /* Minimalist Table */
        .table-container {
            overflow-x: auto;
            margin-top: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            color: var(--apple-text-muted);
            font-weight: 500;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid var(--apple-border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            color: var(--apple-text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .meta-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            color: var(--apple-text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        .no-data {
            text-align: center;
            color: var(--apple-text-muted);
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Auth Module -->
    <div id="authBlock" class="auth-container">
        <div class="auth-logo">BrahBrahBrand</div>
        <div class="auth-subtitle">โปรดใส่รหัสผ่านเพื่อเข้าสู่ระบบบัญชี</div>
        <form id="loginForm">
            <div class="form-group">
                <input type="password" id="passwordInput" class="form-control" placeholder="รหัสผ่าน" style="text-align: center;" required autofocus>
            </div>
            <button type="submit" class="btn">เข้าสู่ระบบ</button>
        </form>
    </div>

    <!-- Main Workspace Application -->
    <div id="appBlock" class="container">
        <header>
            <div>
                <h1>ค่าใช้จ่ายธุรกิจ</h1>
                <p>ระบบบันทึกแยกรายละเอียดตามประเภทและเงื่อนไขอัจฉริยะ</p>
            </div>
            <div>
                <button id="logoutBtn" class="btn-text">Log out</button>
            </div>
        </header>

        <!-- Stats Grid Dashboard -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">รวมยอดงบประมาณที่ใช้</div>
                <div class="value" id="totalAmount">0.00 ฿</div>
            </div>
            <div class="stat-box">
                <div class="label">จำนวนรายการที่กรอก</div>
                <div class="value" id="totalCount">0 รายการ</div>
            </div>
        </div>

        <div class="app-grid">
            <!-- Left Grid: Entry Panel -->
            <div class="card">
                <h2>บันทึกรายการใหม่</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="date">วันที่</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">หมวดหมู่ค่าใช้จ่าย</label>
                        <select id="category" class="form-control" required>
                            <option value="">-- เลือกหมวดหมู่ --</option>
                            <option value="ค่าน้ำมัน">ค่าน้ำมัน</option>
                            <option value="ค่าเบี้ยเลี้ยง">ค่าเบี้ยเลี้ยง</option>
                            <option value="ค่าเงินเดือน">ค่าเงินเดือน</option>
                            <option value="ค่าประกันสังคม">ค่าประกันสังคม</option>
                            <option value="ค่าทางด่วน / ค่าผ่านทาง">ค่าทางด่วน / ค่าผ่านทาง</option>
                            <option value="ค่าโทรศัพท์ / อินเตอร์เน็ต">ค่าโทรศัพท์ / อินเตอร์เน็ต</option>
                            <option value="ค่าไฟฟ้า / ประปา">ค่าไฟฟ้า / ประปา</option>
                            <option value="ค่าส่งเอกสาร / พัสดุ / ขนส่งสินค้า">ค่าส่งเอกสาร / พัสดุ / ขนส่งสินค้า</option>
                            <option value="ค่าอุปกรณ์สำนักงาน">ค่าอุปกรณ์สำนักงาน</option>
                            <option value="ค่าอุปกรณ์ซ่อมบำรุงรถยนต์">ค่าอุปกรณ์ซ่อมบำรุงรถยนต์</option>
                            <option value="ค่าปรับจราจร">ค่าปรับจราจร</option>
                            <option value="ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ">ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ</option>
                            <option value="ค่างานศพ / งานแต่ง / บริจาค / งานบุญ">ค่างานศพ / งานแต่ง / บริจาค / งานบุญ</option>
                            <option value="ค่าน้ำดื่ม">ค่าน้ำดื่ม</option>
                            <option value="ค่าแรงพิเศษลูกน้อง">ค่าแรงพิเศษลูกน้อง</option>
                            <option value="ค่าแรง Outsource">ค่าแรง Outsource</option>
                            <option value="ค่าไหว้เจ้า">ค่าไหว้เจ้า</option>
                            <option value="ค่ารับรองแขก">ค่ารับรองแขก</option>
                        </select>
                    </div>

                    <!-- Conditional Field 1: Vehicle Target (ทะเบียนรถ) -->
                    <div id="vehicleFieldBlock" class="form-group conditional-field">
                        <label for="vehiclePlate">ทะเบียนรถที่เกี่ยวข้อง</label>
                        <input type="text" id="vehiclePlate" class="form-control" placeholder="เช่น กข-1234 กทม.">
                    </div>

                    <!-- Conditional Field 2: Person Target (ชื่อผู้รับเงิน / พนักงาน) -->
                    <div id="personFieldBlock" class="form-group conditional-field">
                        <label for="personName">ชื่อผู้รับเงิน / พนักงาน</label>
                        <input type="text" id="personName" class="form-control" placeholder="ระบุชื่อผู้รับเงิน">
                    </div>

                    <div class="form-group">
                        <label for="amount">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" class="form-control" min="0.01" step="0.01" placeholder="0.00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="note">บันทึกใจความสำคัญ (รายละเอียด)</label>
                        <input type="text" id="note" class="form-control" placeholder="ระบุรายละเอียดเพิ่มเติม">
                    </div>
                    
                    <button type="submit" class="btn" style="margin-top: 8px;">เพิ่มรายการบันทึก</button>
                </form>
            </div>

            <!-- Right Grid: Output Dashboard -->
            <div style="display: flex; flex-direction: column; gap: 32px;">
                <!-- Ledger & Filters -->
                <div class="card">
                    <div class="filter-group">
                        <h2>สมุดบัญชีรายจ่าย</h2>
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <select id="filterCategory" class="form-control filter-select">
                                <option value="">หมวดหมู่ทั้งหมด</option>
                                <option value="ค่าน้ำมัน">ค่าน้ำมัน</option>
                                <option value="ค่าเบี้ยเลี้ยง">ค่าเบี้ยเลี้ยง</option>
                                <option value="ค่าเงินเดือน">ค่าเงินเดือน</option>
                                <option value="ค่าทางด่วน / ค่าผ่านทาง">ค่าทางด่วน</option>
                                <option value="ค่าไฟฟ้า / ประปา">ค่าไฟ/ค่าน้ำ</option>
                                <option value="ค่าอุปกรณ์ซ่อมบำรุงรถยนต์">ค่าซ่อมรถ</option>
                                <option value="ค่าแรง Outsource">ค่าแรง Outsource</option>
                            </select>
                            <button id="exportBtn" class="btn btn-secondary" style="height: 36px; padding: 0 14px; font-size: 13px; width: auto; border-radius: 8px;">Export</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 110px;">วันที่</th>
                                    <th style="width: 180px;">หมวดหมู่</th>
                                    <th>รายละเอียดบันทึก</th>
                                    <th style="text-align: right; width: 130px;">จำนวนเงิน</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                        <div id="noDataMessage" class="no-data" style="display: none;">
                            ไม่พบรายการตามหมวดหมู่ที่เลือก
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password Protection Cryptography (Default: 1234)
        const HASHED_PASSWORD_KEY = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; 

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Database Seed Mocking
        const defaultMock = [
            { id: 1, date: '2026-07-01', category: 'ค่าน้ำมัน', amount: 1500.00, note: 'เติมดีเซลเต็มถังรถส่งของ', vehiclePlate: 'กข-9999 สมุทรสาคร', personName: '' },
            { id: 2, date: '2026-07-04', category: 'ค่าแรง Outsource', amount: 4500.00, note: 'ค่าออกแบบกราฟิกแบนเนอร์', vehiclePlate: '', personName: 'นายสมศักดิ์ (ฟรีแลนซ์)' },
            { id: 3, date: '2026-07-08', category: 'ค่าไฟฟ้า / ประปา', amount: 2350.00, note: 'ค่าน้ำค่าไฟประจำออฟฟิศ', vehiclePlate: '', personName: '' }
        ];

        let expenses = JSON.parse(localStorage.getItem('apple_conditional_db')) || defaultMock;
        if (!localStorage.getItem('apple_conditional_db')) {
            localStorage.setItem('apple_conditional_db', JSON.stringify(expenses));
        }

        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // Elements Group
        const authBlock = document.getElementById('authBlock');
        const appBlock = document.getElementById('appBlock');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const logoutBtn = document.getElementById('logoutBtn');
        const expenseForm = document.getElementById('expenseForm');
        const categorySelect = document.getElementById('category');
        const vehicleFieldBlock = document.getElementById('vehicleFieldBlock');
        const vehiclePlateInput = document.getElementById('vehiclePlate');
        const personFieldBlock = document.getElementById('personFieldBlock');
        const personNameInput = document.getElementById('personName');
        const tableBody = document.getElementById('tableBody');
        const noDataMessage = document.getElementById('noDataMessage');
        const totalAmountEl = document.getElementById('totalAmount');
        const totalCountEl = document.getElementById('totalCount');
        const filterCategory = document.getElementById('filterCategory');
        const exportBtn = document.getElementById('exportBtn');

        // Logic Groups for Fields Visibility
        const vehicleCategories = ['ค่าน้ำมัน', 'ค่าอุปกรณ์ซ่อมบำรุงรถยนต์', 'ค่าพรบ.รถ / ประกันรถ / ภาษีรถ /ตรวจสภาพพรบ'];
        const personCategories = ['ค่าเบี้ยเลี้ยง', 'ค่าเงินเดือน', 'ค่าแรงพิเศษลูกน้อง', 'ค่าแรง Outsource'];

        // Trigger Fields Visibility on Category Change
        categorySelect.addEventListener('change', function() {
            const val = categorySelect.value;
            
            // Handle Vehicle Block
            if (vehicleCategories.includes(val)) {
                vehicleFieldBlock.classList.add('show');
                vehiclePlateInput.required = true;
            } else {
                vehicleFieldBlock.classList.remove('show');
                vehiclePlateInput.required = false;
                vehiclePlateInput.value = '';
            }

            // Handle Person Block
            if (personCategories.includes(val)) {
                personFieldBlock.classList.add('show');
                personNameInput.required = true;
            } else {
                personFieldBlock.classList.remove('show');
                personNameInput.required = false;
                personNameInput.value = '';
            }
        });

        // Authentication Core
        if (sessionStorage.getItem('isAuthenticated') === 'true') {
            authBlock.style.display = 'none';
            appBlock.style.display = 'block';
            renderAppCore();
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const inputHash = await sha256(passwordInput.value);
            if (inputHash === HASHED_PASSWORD_KEY) {
                sessionStorage.setItem('isAuthenticated', 'true');
                authBlock.style.display = 'none';
                appBlock.style.display = 'block';
                renderAppCore();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง โปรดลองอีกครั้ง');
                passwordInput.value = '';
            }
        });

        logoutBtn.addEventListener('click', function() {
            sessionStorage.removeItem('isAuthenticated');
            window.location.reload();
        });

        // Data Management Render Engine
        function renderAppCore() {
            const catFilter = filterCategory.value;
            const filtered = expenses.filter(exp => catFilter === '' || exp.category === catFilter);
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            tableBody.innerHTML = '';
            if (filtered.length === 0) {
                noDataMessage.style.display = 'block';
            } else {
                noDataMessage.style.display = 'none';
                filtered.forEach(exp => {
                    let dynamicMeta = '';
                    if (exp.vehiclePlate) dynamicMeta = `<br><span class="meta-tag">🚗 ทะเบียน: ${exp.vehiclePlate}</span>`;
                    if (exp.personName) dynamicMeta = `<br><span class="meta-tag">👤 ผู้รับเงิน: ${exp.personName}</span>`;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="color: var(--apple-text-muted);">${exp.date}</td>
                        <td style="font-weight: 500;">${exp.category}</td>
                        <td>
                            <div>${exp.note || '—'}</div>
                            ${dynamicMeta}
                        </td>
                        <td style="text-align: right; font-weight: 600;">${exp.amount.toLocaleString('th-TH', {minimumFractionDigits: 2})} ฿</td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            const totalSum = filtered.reduce((sum, exp) => sum + parseFloat(exp.amount), 0);
            totalAmountEl.textContent = `${totalSum.toLocaleString('th-TH', {minimumFractionDigits: 2})} ฿`;
            totalCountEl.textContent = `${filtered.length} รายการ`;
        }

        // Form Submit Actions
        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                date: document.getElementById('date').value,
                category: categorySelect.value,
                amount: parseFloat(document.getElementById('amount').value),
                note: document.getElementById('note').value,
                vehiclePlate: vehiclePlateInput.value,
                personName: personNameInput.value
            };

            expenses.push(newRecord);
            localStorage.setItem('apple_conditional_db', JSON.stringify(expenses));
            
            // Reset input values
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            vehiclePlateInput.value = '';
            personNameInput.value = '';
            
            // Hide conditional elements
            vehicleFieldBlock.classList.remove('show');
            personFieldBlock.classList.remove('show');
            
            renderAppCore();
        });

        filterCategory.addEventListener('change', renderAppCore);

        // Advanced CSV Data Exporter
        exportBtn.addEventListener('click', function() {
            if (expenses.length === 0) return alert('ไม่มีข้อมูลสำหรับออกรายงาน');
            
            let csvContent = "\uFEFF"; 
            csvContent += "วันที่,หมวดหมู่,รายละเอียดบันทึก,ทะเบียนรถ,ผู้รับเงิน/พนักงาน,จำนวนเงิน (บาท)\n";
            
            expenses.forEach(exp => {
                const noteSanitized = (exp.note || '').replace(/"/g, '""');
                const plateSanitized = (exp.vehiclePlate || '').replace(/"/g, '""');
                const personSanitized = (exp.personName || '').replace(/"/g, '""');
                csvContent += `"${exp.date}","${exp.category}","${noteSanitized}","${plateSanitized}","${personSanitized}","${exp.amount}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "BrahBrahBrand_Master_Expenses.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
